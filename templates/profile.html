<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #1e293b;
            padding: 40px 20px;
        }

        .profile-container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        /* Profile Left Card */
        .profile-card {
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            height: fit-content;
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background-color: #007bff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: white;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .profile-card h3 {
            font-size: 20px;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .profile-card .role-badge {
            display: inline-block;
            background: #e2e8f0;
            color: #475569;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .profile-nav {
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            text-align: left;
        }

        .profile-nav a {
            display: block;
            color: #475569;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 15px;
            transition: all 0.2s;
        }

        .profile-nav a.active, .profile-nav a:hover {
            background-color: #f1f5f9;
            color: #007bff;
            font-weight: 600;
        }

        /* Profile Right Details Area */
        .profile-details {
            background: #ffffff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .profile-details h2 {
            font-size: 22px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #334155;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #007bff;
            outline: none;
        }

        .form-group textarea {
            resize: none;
            height: 80px;
        }

        .save-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .save-btn:hover {
            background-color: #0056b3;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            grid-column: span 2;
        }

        .back-link:hover {
            text-decoration: underline;
            color: #334155;
        }

        /* Responsive Breakpoint */
        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            .back-link {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <a href="/comments_page" class="back-link">← Back to comments</a>

        <div class="profile-card">
            <div class="avatar-container">
                <div class="profile-avatar">A</div>
            </div>
            <h3>Welcome {{firstname}}</h3>
            <span class="role-badge">normal user</span>
            
            <div class="profile-nav">
                <a href="#" class="active">Account Settings</a>
                <a href="#">Security & Password</a>
                <a href="#">Notification Settings</a>
            </div>
        </div>

        <div class="profile-details">
            <h2>Account Details</h2>
            
            <form action="#" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="profile-firstname">{{firstname}}</label>
                        <input type="text" id="profile-firstname"  placeholder="Your first name">
                    </div>
                    <div class="form-group">
                        <label for="profile-lastname">Last Name</label>
                        <input type="text" id="profile-lastname" value="User" placeholder="Your last name">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="profile-email">Email Address</label>
                        <input type="email" id="profile-email" value="admin@example.com" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label for="profile-phone">Phone Number</label>
                        <input type="tel" id="profile-phone" value="+1 (555) 019-2834" placeholder="+1 (555) 000-0000">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="profile-bio">Bio</label>
                    <textarea id="profile-bio" placeholder="Write a short description about yourself...">Main system administrator overseeing platform operations, template development, and code standards enforcement.</textarea>
                </div>

                <button type="submit" class="save-btn">Save Changes</button>
            </form>
        </div>
    </div>

</body>
</html>
